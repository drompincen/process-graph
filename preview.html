<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Process Graph Preview</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0f1117;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Segoe UI', system-ui, sans-serif;
    padding: 40px 20px;
  }
  h1 { color: #e2e8f0; font-size: 1.1rem; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 6px; opacity: 0.7; }
  .subtitle { color: #64748b; font-size: 0.78rem; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 32px; }
  #diagram-wrap { background: #161b27; border: 1px solid #1e2535; border-radius: 12px; overflow: hidden; box-shadow: 0 24px 64px rgba(0,0,0,0.6); max-width: 100%; }
  svg { display: block; }
</style>
</head>
<body>
<h1>Purchase Approval Process</h1>
<div class="subtitle">Process Improvement &nbsp;·&nbsp; Before &amp; After</div>
<div id="diagram-wrap">
<!--
  NODE EDGES — used to compute exact connection endpoints
  ═══════════════════════════════════════════════════════
  Rule: path endpoint = node_edge ± 1px so arrowhead TIP
        lands exactly at the node edge, body stays outside.
        (marker refX=7 means tip is 1px past path endpoint)

  BEFORE nodes   [rect(x,y,w,h)]  key edges
  ──────────────────────────────────────────
  B-Start        rect( 88, 90, 64,36) right=152
  B-Form         rect(195, 86,110,44) left=195  right=305  REMOVED
  B-MgrReview    rect(325,206,110,44) left=325  bottom=250
  B-FinCheck     rect(325,326,110,44) top=326   right=435  REMOVED
  B-Approved     rect(455,330, 80,36) left=455

  AFTER nodes    [rect(x,y,w,h)]  key edges
  ──────────────────────────────────────────
  A-Start        rect(588, 90, 64,36) right=652
  A-Portal       rect(690, 86,110,44) left=690  bottom=130  NEW
  A-AutoCheck    rect(690,446,110,44) top=446   right=800   NEW  (below portal, same x=745)
  A-MgrReview    rect(820,206,110,44) left=820  right=930  bottom=250
  A-Diamond      top=(1005,314) right=(1057,348) bot=(1005,382) left=(953,348)
  A-Approved     rect(965,210, 80,36) bottom=246  (YES — above diamond, same cx=1005)
  A-Rejected     rect(965,450, 80,36) top=450     (NO  — below diamond, same cx=1005)

  CONNECTION ENDPOINTS (from_edge → to_edge−1)
  ──────────────────────────────────────────────
  BEFORE
  B1  Start→Form         (152,108) → (194,108)   horiz
  B2  Form→MgrReview     (305,108) → (324,228)   S-curve (C 315,108 315,228)
  B3  MgrReview→FinCheck (380,250) → (380,325)   vert down
  B4  FinCheck→Approved  (435,348) → (454,348)   horiz

  AFTER
  A1  Start→Portal       (652,108) → (689,108)   horiz
  A2  Portal→AutoCheck   (745,130) → (745,445)   vert down  (same x=745)
  A3  AutoCheck→MgrRev   (800,468) → (875,251)   S-curve (C 875,468 875,252)
  A4  MgrRev→Diamond     (930,228) → (952,348)   S-curve (C 950,228 950,348)
  A5  Diamond→Approved   (1005,314)→ (1005,247)  vert up    YES
  A6  Diamond→Rejected   (1005,382)→ (1005,449)  vert down  NO
-->
<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="560" viewBox="0 0 1100 560">
<defs>
  <!-- Filters -->
  <filter id="sh"  x="-20%" y="-20%" width="140%" height="140%">
    <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#000" flood-opacity="0.5"/>
  </filter>
  <filter id="g-g" x="-50%" y="-50%" width="200%" height="200%">
    <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#22c55e" flood-opacity="0.6"/>
  </filter>
  <filter id="g-r" x="-50%" y="-50%" width="200%" height="200%">
    <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#ef4444" flood-opacity="0.5"/>
  </filter>

  <!-- No SVG markers — arrowheads are explicit polygons in Layer 3 -->

  <!-- Lane bg gradients -->
  <linearGradient id="lg0" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%"   stop-color="#1e3a5f" stop-opacity="0.6"/>
    <stop offset="100%" stop-color="#161b27" stop-opacity="0.15"/>
  </linearGradient>
  <linearGradient id="lg1" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%"   stop-color="#1a3a2a" stop-opacity="0.6"/>
    <stop offset="100%" stop-color="#161b27" stop-opacity="0.15"/>
  </linearGradient>
  <linearGradient id="lg2" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%"   stop-color="#3a1a3a" stop-opacity="0.6"/>
    <stop offset="100%" stop-color="#161b27" stop-opacity="0.15"/>
  </linearGradient>
  <linearGradient id="lg3" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%"   stop-color="#2a2a1a" stop-opacity="0.6"/>
    <stop offset="100%" stop-color="#161b27" stop-opacity="0.15"/>
  </linearGradient>

  <!-- Node fill gradients -->
  <linearGradient id="nf-task"  x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%"   stop-color="#2d3a52"/>
    <stop offset="100%" stop-color="#1e2a3e"/>
  </linearGradient>
  <linearGradient id="nf-term"  x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%"   stop-color="#232d40"/>
    <stop offset="100%" stop-color="#161b27"/>
  </linearGradient>
  <linearGradient id="nf-rem"   x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%"   stop-color="#3a1e1e"/>
    <stop offset="100%" stop-color="#2a1515"/>
  </linearGradient>
  <linearGradient id="nf-add"   x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%"   stop-color="#1a3a26"/>
    <stop offset="100%" stop-color="#102a1a"/>
  </linearGradient>
  <linearGradient id="nf-dec"   x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%"   stop-color="#3a3020"/>
    <stop offset="100%" stop-color="#2a2215"/>
  </linearGradient>
  <linearGradient id="nf-ok"    x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%"   stop-color="#14532d"/>
    <stop offset="100%" stop-color="#0d3d1f"/>
  </linearGradient>
  <linearGradient id="nf-rej"   x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%"   stop-color="#450a0a"/>
    <stop offset="100%" stop-color="#2d0606"/>
  </linearGradient>

  <!-- Grid dots -->
  <pattern id="grid" width="24" height="24" patternUnits="userSpaceOnUse">
    <circle cx="12" cy="12" r="0.7" fill="rgba(255,255,255,0.04)"/>
  </pattern>
</defs>

<!-- ── Background ───────────────────────────────────────────── -->
<rect width="1100" height="560" fill="#161b27"/>
<rect width="1100" height="560" fill="url(#grid)"/>

<!-- ── Lane bands ───────────────────────────────────────────── -->
<rect x="0" y="48"  width="1100" height="120" fill="url(#lg0)"/>
<rect x="0" y="168" width="1100" height="120" fill="url(#lg1)"/>
<rect x="0" y="288" width="1100" height="120" fill="url(#lg2)"/>

<!-- ── Header bar ────────────────────────────────────────────── -->
<rect x="0" y="0" width="1100" height="48" fill="#0d1120"/>
<text x="314" y="29" font-family="'Segoe UI',sans-serif" font-size="11" fill="#64748b" text-anchor="middle" letter-spacing="0.16em" font-weight="700">BEFORE</text>

<line x1="352" y1="24" x2="540" y2="24" stroke="#2a3550" stroke-width="1"/>

<text x="828" y="29" font-family="'Segoe UI',sans-serif" font-size="11" fill="#22c55e" text-anchor="middle" letter-spacing="0.16em" font-weight="700" opacity="0.9">AFTER</text>

<!-- Divider -->
<line x1="550" y1="0" x2="550" y2="560" stroke="#222d40" stroke-width="1.5" stroke-dasharray="6,4"/>


<!-- ═══════════════════════════════════════════════════════════ -->
<!-- LAYER 1 — CONNECTION LINES                                 -->
<!-- Paths start 7px inside source node (hidden by node fill)  -->
<!-- Paths end at the arrowhead TAIL — polygons in Layer 3     -->
<!-- complete each arrow above the nodes.                       -->
<!--                                                            -->
<!-- Arrowhead size: 9px long, 8px wide (±4px either side)     -->
<!--   right → tip(tx,ty): tail at (tx-9, ty)                  -->
<!--   down  → tip(tx,ty): tail at (tx,   ty-9)                -->
<!--   up    → tip(tx,ty): tail at (tx,   ty+9)                -->
<!-- ═══════════════════════════════════════════════════════════ -->

<!-- ── BEFORE connections ─── -->

<!-- B1  Start→Form   horiz right
         src inside Start right(152)→x=145  |  tail of arrowhead tip(194,108)→x=185 -->
<line x1="145" y1="108" x2="185" y2="108" stroke="#475569" stroke-width="1.8"/>

<!-- B2  Form→MgrReview   S-curve, arrives horizontally at MgrReview left
         src inside Form right(305)→x=298   |  tail of arrowhead tip(324,228)→x=315
         C1 exits Form horizontally; C2 enters MgrReview horizontally -->
<path d="M 298,108 C 315,108 310,228 315,228"
      stroke="#475569" stroke-width="1.8" fill="none"/>

<!-- B3  MgrReview→FinCheck   vert down
         src inside MgrReview bottom(250)→y=243  |  tail tip(380,325)→y=316 -->
<line x1="380" y1="243" x2="380" y2="316" stroke="#475569" stroke-width="1.8"/>

<!-- B4  FinCheck→Approved   horiz right
         src inside FinCheck right(435)→x=428  |  tail tip(454,348)→x=445 -->
<line x1="428" y1="348" x2="445" y2="348" stroke="#475569" stroke-width="1.8"/>


<!-- ── AFTER connections ─── -->

<!-- A1  Start→Portal   horiz right
         src inside Start right(652)→x=645  |  tail tip(689,108)→x=680 -->
<line x1="645" y1="108" x2="680" y2="108" stroke="#60a5fa" stroke-width="1.8" opacity="0.9"/>

<!-- A2  Portal→AutoCheck   vert down  x=745
         src inside Portal bottom(130)→y=123  |  tail tip(745,445)→y=436
         x=745 is left of MgrReview (x=820–930) — no overlap -->

<!-- A3  AutoCheck→MgrReview   S-curve, arrives vertically at MgrReview bottom
         src inside AutoCheck right(800)→x=793  |  tail tip(875,251)→y=260

      stroke="#60a5fa" stroke-width="1.8" fill="none" opacity="0.9"/>

<!-- A4  MgrReview→Diamond   S-curve, arrives horizontally at diamond left-point
         src inside MgrReview right(930)→x=923  |  tail tip(952,348)→x=943

<path d="M 923,228 C 950,228 940,348 943,348"
      stroke="#60a5fa" stroke-width="1.8" fill="none" opacity="0.9"/>

<!-- A5  Diamond→APPROVED   vert up   YES
         src inside diamond top(314)→y=321  |  tail tip(1005,247)→y=256 -->

<!-- A6  Diamond→REJECTED   vert down  NO

<line x1="1005" y1="375" x2="1005" y2="440" stroke="#f87171" stroke-width="2.2"/>
