<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Process Graph</title>
<link rel="stylesheet" href="css/core.css">
<link rel="stylesheet" href="css/diagram.css">
<link rel="stylesheet" href="css/diff.css">
<link rel="stylesheet" href="css/animation.css">
<link rel="stylesheet" href="css/panels.css">
<link rel="stylesheet" href="css/narrative.css">
<link rel="stylesheet" href="css/widgets.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>

<!-- ═══════════════════════════════════════════════════════════
     HEADER
     ═══════════════════════════════════════════════════════════ -->
<header id="header">
  <div class="controls-left">
    <span class="brand">⬡ PROCESS GRAPH</span>
    <div class="h-divider"></div>

    <select id="json-selector" title="Load diagram"></select>

    <div class="h-divider"></div>

    <!-- Phase Navigation (multi-phase slider + dots) -->
    <div id="phase-nav" style="display:none">
      <span class="phase-label">Phase:</span>
      <div id="phase-slider-container">
        <input type="range" id="phase-slider" min="0" max="3" value="0" step="1">
        <div id="phase-dots-track"></div>
      </div>
      <span id="phase-current-label">0 — Baseline</span>
      <button id="btn-diff" class="view-btn" title="Highlight changes between phases">Diff</button>
    </div>

    <div class="h-divider"></div>

    <!-- Playback controls (flow animation — token moves along sequence steps) -->
    <div class="playback-controls">
      <button id="btn-rewind" class="playback-btn" title="Reset flow animation">⏮</button>
      <button id="btn-play-flow" class="playback-btn" title="Animate flow sequence">▶</button>
      <button id="btn-ff-flow" class="playback-btn" title="Fast-forward to end of sequence">⏭</button>
    </div>

  </div>

  <div class="controls-right">
    <!-- Zoom presets -->
    <div id="zoom-group" role="group" title="Diagram width preset">
      <button id="btn-zoom-fit" class="zoom-btn active" data-zoom="fit"  title="Fit to window">Fit</button>
      <button id="btn-zoom-hd"  class="zoom-btn"        data-zoom="1080p" title="1920 px wide (HD)">HD</button>
      <button id="btn-zoom-4k"  class="zoom-btn"        data-zoom="4k"   title="3840 px wide (4K)">4K</button>
    </div>

    <div class="h-divider"></div>

    <!-- Story mode (shown when graph.story present) -->
    <button id="btn-story" style="display:none" title="Open story mode">📖 Story</button>

    <!-- KPI overlay toggle -->
    <button id="btn-kpi-overlay" title="Toggle KPI overlays">KPI</button>

    <div class="h-divider"></div>

    <!-- Options dropdown -->
    <div class="dropdown" id="options-dropdown">
      <button id="btn-options">⚙ Options ▾</button>
      <div class="dropdown-menu" id="options-menu">
        <label class="menu-item"><input type="checkbox" id="chk-edit-mode"> Edit Mode</label>
        <label class="menu-item"><input type="checkbox" id="chk-show-editor"> JSON Editor</label>
        <label class="menu-item"><input type="checkbox" id="chk-show-notes"> Notes</label>
        <label class="menu-item"><input type="checkbox" id="chk-show-metrics"> Metrics Panel</label>
        <label class="menu-item"><input type="checkbox" id="chk-show-kpis"> KPI HUD</label>
        <label class="menu-item"><input type="checkbox" id="chk-show-benefits"> Benefits</label>
        <hr class="menu-sep">
        <label class="menu-item"><input type="checkbox" id="chk-sequence-view"> Sequence View</label>
        <hr class="menu-sep">
        <button class="menu-btn" id="btn-upload-json">📀 Upload JSON</button>
        <button class="menu-btn" id="btn-download-json">📥 Download JSON</button>
        <button class="menu-btn" id="btn-export-svg">🖼 Export SVG</button>
        <button class="menu-btn" id="btn-export-png">🖼 Export PNG</button>
        <button class="menu-btn" id="btn-export-pdf">📄 Export PDF</button>
        <hr class="menu-sep">
        <label class="menu-item"><input type="checkbox" id="chk-pause-step"> Pause / Step</label>
        <label class="menu-item delay-row">
          Delay: <input type="range" id="delay-slider" min="0.3" max="3" step="0.1" value="1">
          <span id="delay-label">1.0s</span>
        </label>
        <hr class="menu-sep">
        <label class="menu-item"><input type="checkbox" id="chk-light-mode">☀ Light Theme</label>
        <hr class="menu-sep">
        <div class="menu-item" style="display:flex;flex-direction:column;gap:2px;">
          <span style="font-size:11px;color:#94a3b8;">Arrow Style</span>
          <label style="font-size:11px;"><input type="radio" name="arrow-style" id="radio-arrow-orthogonal" checked> Orthogonal</label>
          <label style="font-size:11px;"><input type="radio" name="arrow-style" id="radio-arrow-curved"> Curved</label>
        </div>
        <label class="menu-item"><input type="checkbox" id="chk-flow-animation"> Flow Animation</label>
        <hr class="menu-sep">
        <div class="font-size-row">
          <span>Font size</span>
          <button id="btn-font-down">A−</button>
          <button id="btn-font-up">A+</button>
        </div>
      </div>
    </div>
  </div>
</header>

<!-- ═══════════════════════════════════════════════════════════
     MAIN LAYOUT
     ═══════════════════════════════════════════════════════════ -->
<div id="app-body">

  <!-- LEFT: JSON Editor (hidden by default) -->
  <aside id="editor-pane" style="display:none">
    <div id="editor-toolbar">
      <button id="btn-update">Update Diagram</button>
      <span id="editor-error"></span>
    </div>
    <textarea id="json-editor" spellcheck="false" autocomplete="off"></textarea>
  </aside>

  <!-- CENTER: Diagram / Sequence (one visible at a time) -->
  <main id="stage">

    <!-- SVG diagram canvas -->
    <div id="svg-container">
      <svg id="diagram-svg" xmlns="http://www.w3.org/2000/svg">
        <defs id="svg-defs"></defs>
        <g id="background-layer"></g>
        <g id="lanes-layer"></g>
        <g id="connections-layer"></g>
        <g id="nodes-layer"></g>
        <g id="annotations-layer"></g>
        <g id="overlays-layer"></g>
        <g id="token-layer"></g>
      </svg>
    </div>

    <!-- Sequence view (hidden by default) -->
    <div id="sequence-container" style="display:none">
      <svg id="sequence-svg" xmlns="http://www.w3.org/2000/svg"></svg>
    </div>

    <!-- Floating widgets (positioned absolute within #stage) -->
    <div id="kpi-hud"        style="display:none"></div>
    <div id="metrics-panel"  style="display:none"></div>
    <div id="benefits-panel" style="display:none"></div>
    <div id="notebook"       style="display:none">
      <div class="notebook-header">Notes</div>
      <pre id="notebook-text"></pre>
    </div>

  </main>

</div>

<!-- Context menu (positioned absolutely, hidden by default) -->
<div id="context-menu" style="display:none"></div>

<!-- NARRATIVE VIEW (full-page overlay, hidden by default) -->
<div id="narrative-view" style="display:none">
  <div id="narrative-main">
    <div id="slide-container"></div>
    <div id="slide-nav-dots"></div>
    <div id="narrative-font-controls">
      <button id="btn-narrative-font-smaller">A−</button>
      <button id="btn-narrative-font-larger">A+</button>
    </div>
  </div>
  <div id="narrative-sidebar">
    <div id="narrative-benefits"></div>
    <div id="narrative-kpi-hud"></div>
  </div>
  <button id="btn-back-to-story" style="display:none">← Back to Story</button>
</div>

<!-- ═══════════════════════════════════════════════════════════
     LOG PANE
     ═══════════════════════════════════════════════════════════ -->
<div id="pane-resizer"></div>
<div id="log-pane">
  <div id="log-entries">
    <div class="log-ready">Ready — load a diagram to begin</div>
  </div>
</div>

<!-- ═══════════════════════════════════════════════════════════
     EXPORT PDF MODAL
     ═══════════════════════════════════════════════════════════ -->
<div id="modal-export-pdf" class="modal" style="display:none">
  <div class="modal-card">
    <h3>Export PDF</h3>
    <label class="modal-opt"><input type="radio" name="pdf-mode" value="diagram" checked> Diagram only</label>
    <label class="modal-opt"><input type="radio" name="pdf-mode" value="sequence"> Sequence view only</label>
    <label class="modal-opt"><input type="radio" name="pdf-mode" value="both"> Both (stacked)</label>
    <div class="modal-actions">
      <button id="btn-pdf-cancel">Cancel</button>
      <button id="btn-pdf-confirm" class="btn-primary">Export</button>
    </div>
  </div>
</div>

<!-- ═══════════════════════════════════════════════════════════
     MINIMAP + ZOOM INDICATOR
     ═══════════════════════════════════════════════════════════ -->
<div id="minimap">
  <canvas id="minimap-canvas" width="200" height="150"></canvas>
</div>
<div id="zoom-pct-label">100%</div>

<!-- Hidden file input -->
<input type="file" id="file-input" accept=".json" style="display:none">

<!-- ═══════════════════════════════════════════════════════════
     SIMULATION SUMMARY OVERLAY
     ═══════════════════════════════════════════════════════════ -->
<div id="sim-overlay" class="sim-overlay" style="display:none"></div>

<!-- ═══════════════════════════════════════════════════════════
     ENTRY POINT
     ═══════════════════════════════════════════════════════════ -->
<script type="module" src="js/main.js"></script>

<!-- Phase slider wiring + playback + font controls -->
<script type="module">
import { state, dom } from './js/state.js';

document.addEventListener('DOMContentLoaded', () => {
  // Wait a tick for main.js init to complete and populate dom{}
  setTimeout(() => {
    wirePhaseNav();
    wirePlayback();
    wireFontControls();
  }, 0);
});

/* ════════════════════════════════════════════════════════════════
   PHASE NAVIGATION
   ════════════════════════════════════════════════════════════════ */
function wirePhaseNav() {
  const slider    = dom.phaseSlider;
  const container = dom.phaseNav;
  const label     = dom.phaseCurrentLabel;
  const dotsTrack = dom.phaseDotsTrack;
  const diffBtn   = dom.btnDiff;

  if (!slider || !container) {
    console.warn('[phase-nav] DOM elements not found, skipping phase nav wiring');
    return;
  }

  // ── Observe graph loads via json-selector changes and MutationObserver ──
  const jsonSel = dom.jsonSelector;
  if (jsonSel) {
    jsonSel.addEventListener('change', () => {
      setTimeout(() => syncPhaseNavVisibility(), 200);
    });
  }

  const svgEl = dom.diagramSvg;
  if (svgEl) {
    const observer = new MutationObserver(() => syncPhaseNavVisibility());
    observer.observe(svgEl, { childList: true, subtree: true });
  }

  setTimeout(() => syncPhaseNavVisibility(), 500);

  function syncPhaseNavVisibility() {
    const g = state.graph;
    if (!g || !g.phases || g.phases.length <= 2) {
      container.style.display = 'none';
      return;
    }

    container.style.display = 'flex';

    const maxIdx = g.phases.length - 1;
    slider.min = '0';
    slider.max = String(maxIdx);

    if (state.currentPhaseIndex > maxIdx) state.currentPhaseIndex = maxIdx;
    slider.value = String(state.currentPhaseIndex);

    renderDots(g.phases, state.currentPhaseIndex);
    updateLabel(g.phases, state.currentPhaseIndex);
  }

  function renderDots(phases, activeIdx) {
    if (!dotsTrack) return;
    dotsTrack.innerHTML = '';
    phases.forEach((phase, idx) => {
      const dot = document.createElement('span');
      dot.className = 'phase-dot';
      if (idx <= activeIdx) dot.classList.add('reached');
      if (idx === activeIdx) dot.classList.add('active');
      dot.title = phase.label || phase.id || `Phase ${idx}`;
      dotsTrack.appendChild(dot);
    });
  }

  function updateLabel(phases, idx) {
    if (!label) return;
    const phase = phases[idx];
    if (phase && phase.label) {
      label.textContent = phase.label;
    } else if (phase && phase.id) {
      label.textContent = `${idx} — ${phase.id}`;
    } else {
      label.textContent = `Phase ${idx}`;
    }
  }

  slider.addEventListener('input', () => {
    const idx = parseInt(slider.value, 10);
    state.currentPhaseIndex = idx;

    const g = state.graph;
    if (!g || !g.phases) return;

    renderDots(g.phases, idx);
    updateLabel(g.phases, idx);
    triggerReRender();
  });

  if (diffBtn) {
    diffBtn.addEventListener('click', () => {
      state.diffMode = !state.diffMode;
      diffBtn.classList.toggle('active', state.diffMode);
      triggerReRender();
    });
  }

  function triggerReRender() {
    window.dispatchEvent(new CustomEvent('phase-change', {
      detail: {
        phaseIndex: state.currentPhaseIndex,
        diffMode: state.diffMode
      }
    }));

    import('./js/renderer.js').then(mod => {
      if (mod.renderAll && state.graph) mod.renderAll(state.graph);
    }).catch(() => { /* renderer not loaded yet */ });
  }
}

/* ════════════════════════════════════════════════════════════════
   PLAYBACK CONTROLS (flow animation — token moves along sequence)
   Wiring is handled by animation.js initAnimation() which reads
   dom.btnPlayFlow, dom.btnFfFlow, dom.btnRewind from state.js.
   No additional wiring needed here.
   ════════════════════════════════════════════════════════════════ */
function wirePlayback() {
  // All playback button wiring is done in animation.js initAnimation()
  // which reads the header buttons via dom.btnPlayFlow / dom.btnFfFlow / dom.btnRewind
}

/* ════════════════════════════════════════════════════════════════
   FONT SIZE CONTROLS (A- / A+)
   ════════════════════════════════════════════════════════════════ */
function wireFontControls() {
  const btnDown = document.getElementById('btn-font-down');
  const btnUp   = document.getElementById('btn-font-up');

  if (!btnDown || !btnUp) return;

  function adjustFontSize(delta) {
    document.querySelectorAll('#nodes-layer text, #annotations-layer text').forEach(t => {
      const size = parseFloat(getComputedStyle(t).fontSize) || 12;
      const clamped = Math.max(8, Math.min(20, size + delta));
      t.style.fontSize = clamped + 'px';
      t.style.fontWeight = 'normal';
    });
  }

  btnDown.addEventListener('click', () => {
    adjustFontSize(-1);
    resizeNodesToFitText();
    rerouteConnectionsAfterResize();
  });
  btnUp.addEventListener('click', () => {
    adjustFontSize(1);
    resizeNodesToFitText();
    rerouteConnectionsAfterResize();
  });
}

/* ════════════════════════════════════════════════════════════════
   AUTO-RESIZE NODE BOXES TO FIT TEXT
   ════════════════════════════════════════════════════════════════ */
function resizeNodesToFitText() {
  const PAD_X = 16;
  const PAD_Y = 12;
  const MIN_W = 100;
  const MIN_H = 50;

  document.querySelectorAll('#nodes-layer [data-node-id]').forEach(g => {
    const rect = g.querySelector('rect');
    const texts = g.querySelectorAll('text');
    if (!rect || texts.length === 0) return;

    // Skip gateways (diamonds) and events (circles)
    const cls = g.className.baseVal || '';
    if (cls.includes('gateway') || cls.includes('start-event') || cls.includes('end-event')) return;

    // Get combined text bbox
    let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
    texts.forEach(t => {
      const bb = t.getBBox();
      if (bb.width === 0) return;
      minX = Math.min(minX, bb.x);
      minY = Math.min(minY, bb.y);
      maxX = Math.max(maxX, bb.x + bb.width);
      maxY = Math.max(maxY, bb.y + bb.height);
    });
    if (minX === Infinity) return;

    const textW = maxX - minX;
    const textH = maxY - minY;
    const curW = parseFloat(rect.getAttribute('width'));
    const curH = parseFloat(rect.getAttribute('height'));
    const newW = Math.max(MIN_W, Math.max(curW, textW + 2 * PAD_X));
    const newH = Math.max(MIN_H, Math.max(curH, textH + 2 * PAD_Y));

    if (newW !== curW || newH !== curH) {
      // Expand rect from its center, keeping it in place
      const curX = parseFloat(rect.getAttribute('x'));
      const curY = parseFloat(rect.getAttribute('y'));
      const cx = curX + curW / 2;
      const cy = curY + curH / 2;
      rect.setAttribute('width', newW);
      rect.setAttribute('height', newH);
      rect.setAttribute('x', cx - newW / 2);
      rect.setAttribute('y', cy - newH / 2);
    }
  });
}

/* Re-route connections after node boxes have been resized.
   Only re-routes arrows — does NOT re-render nodes or lanes,
   which would cause swimlanes to resize based on new node sizes. */
function rerouteConnectionsAfterResize() {
  import('./js/routing.js').then(mod => {
    if (mod.renderConnections && state.graph && state.layout) {
      const viewMode = state.viewMode || 'after';
      mod.renderConnections(state.graph, state.layout, viewMode);
    }
  }).catch(() => { /* routing not loaded yet */ });
}
</script>

</body>
</html>
